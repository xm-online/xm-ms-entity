---
components:
    responses:
        "400":
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/RequestError"
            description: "Bad request. Request invalid by business rules"
        "401":
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/RequestError"
            description: "Invalid access token"
        "403":
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/RequestError"
            description: "Forbidden"
        "404":
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/RequestError"
            description: "Not found"
        "500":
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/RequestError"
            description: "Internal server error"
    schemas:
        FunctionName:
            $ref: "#/components/schemas/NameDefinition"
        NameDefinition:
            properties:
                name:
                    type: "string"
            type: "object"
        RequestError:
            properties:
                error:
                    type: "string"
                error_description:
                    type: "string"
            type: "object"
        Structure:
            properties:
                name:
                    type: "string"
                variable:
                    type: "number"
            type: "object"
    securitySchemes:
        oAuth2ClientCredentials:
            flows:
                clientCredentials:
                    scopes:
                        openapi: "Default client scope"
                    tokenUrl: "/uaa/oauth/token"
            type: "oauth2"
        oAuth2Password:
            flows:
                password:
                    scopes:
                        openapi: "Default client scope"
                    tokenUrl: "/uaa/oauth/token"
            type: "oauth2"
