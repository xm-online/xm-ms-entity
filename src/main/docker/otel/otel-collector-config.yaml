# ===================================================================
# OpenTelemetry Collector Configuration
# ===================================================================

file_format: "0.1"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'opentelemetry-collector'
          static_configs:
            - targets: [ 'localhost:8888' ]

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Resource detection and enrichment
  resource:
    attributes:
      - key: environment
        value: local
        action: upsert
      - key: service.namespace
        value: xm
        action: upsert

  # Memory limiter to prevent OOM
  memory_limiter:
    limit_mib: 512

  # Add resource attributes from environment
  resource_detection:
    detectors: [ env, system ]

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # Prometheus metrics exporter
  prometheus:
    endpoint: 0.0.0.0:8888

exporters:
  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel"
    const_labels:
      environment: "local"

  # Jaeger exporter for traces
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  # Logging exporter for debugging
  logging:
    loglevel: info

service:
  extensions: [ health_check, prometheus ]

  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [ otlp, prometheus ]
      processors: [ memory_limiter, batch, resource, resource_detection ]
      exporters: [ prometheus, logging ]

    # Traces pipeline
    traces:
      receivers: [ otlp ]
      processors: [ memory_limiter, batch, resource, resource_detection ]
      exporters: [ jaeger, logging ]

  # Telemetry for the collector itself
  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: "info"
