spring:
  kafka:
    template:
      observation-enabled: true # set kafka producer headers

management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        enabled: true
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0 # report 100% of traces
    export:
      enabled: true
